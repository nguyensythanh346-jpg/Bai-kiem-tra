<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xếp loại học lực</title>
</head>
<body>
<h1>Bài 2 - xếp loại học lực </h1>
<script>
    let diem = prompt("Nhập điểm của bạn: ");
    diem = Number(diem);
    if (diem >= 8.0) {console.log("Giỏi");}
    else if (diem >= 6.5) {console.log("Khá");}
    else if (diem >= 5.0) {console.log("Trung Bình");}
    else {console.log("Yếu");}

    console.log("Điểm của bạn:" + diem)
</script>
</body>
</html>
